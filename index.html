<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC COT Weekly Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #0a0c10;
    --bg-card: #111318;
    --bg-card2: #161a22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #3d4250;
    --accent: #f7931a;
    --accent2: #ffb347;
    --green: #00d4a0;
    --green-bg: rgba(0,212,160,0.08);
    --green-border: rgba(0,212,160,0.2);
    --red: #ff4d6d;
    --red-bg: rgba(255,77,109,0.08);
    --red-border: rgba(255,77,109,0.2);
    --blue: #4d9fff;
    --amber: #f7931a;
    --coral: #ff6b6b;
    --font-main: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    padding: 0;
  }

  /* ---- HEADER ---- */
  .top-bar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .logo span { color: var(--accent); }

  .btc-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(247,147,26,0.1);
    border: 1px solid rgba(247,147,26,0.25);
    border-radius: 6px;
    padding: 4px 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
  }

  .btc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-card2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--font-main);
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
  .btn-refresh svg { width: 14px; height: 14px; }

  /* ---- LAYOUT ---- */
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* ---- PAGE TITLE ---- */
  .page-header { margin-bottom: 2rem; }
  .page-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
  }
  .page-title span { color: var(--accent); }
  .page-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .meta-sep { color: var(--text-dim); }
  #report-date-label { color: var(--accent); }

  /* ---- METRICS GRID ---- */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .actor-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .actor-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .actor-card.am::before { background: var(--blue); }
  .actor-card.lf::before { background: var(--amber); }
  .actor-card.dl::before { background: var(--coral); }
  .actor-card:hover { border-color: var(--border2); }

  .actor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .actor-name { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .actor-icon { font-size: 18px; opacity: 0.5; }

  .position-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .pos-label { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
  .pos-long { font-size: 15px; font-family: var(--font-mono); font-weight: 500; color: var(--green); }
  .pos-short { font-size: 15px; font-family: var(--font-mono); font-weight: 500; color: var(--red); }

  .net-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .net-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .net-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
  .net-value { font-family: var(--font-mono); font-size: 16px; font-weight: 500; }
  .net-value.pos { color: var(--green); }
  .net-value.neg { color: var(--red); }

  .net-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .net-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .net-fill.pos { background: var(--green); }
  .net-fill.neg { background: var(--red); }

  .delta-line { font-size: 11px; font-family: var(--font-mono); }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red); }

  /* ---- CHART SECTION ---- */
  .section { margin-bottom: 24px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; }

  .tab-group { display: flex; gap: 4px; }
  .tab {
    padding: 5px 12px;
    font-family: var(--font-main);
    font-size: 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--border2); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  .chart-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .chart-legend {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-line { width: 20px; height: 2px; border-radius: 1px; }
  .legend-dashed { width: 20px; height: 0; border-top: 2px dashed; border-radius: 0; }

  .chart-wrap { position: relative; height: 260px; }

  /* ---- SIGNAL CARDS ---- */
  .signals-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .signal-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .signal-name { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; }
  .signal-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 5px;
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }
  .sig-bullish { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
  .sig-bearish { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
  .sig-neutral { background: rgba(107,114,128,0.1); border: 1px solid rgba(107,114,128,0.2); color: var(--text-muted); }
  .signal-text { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

  /* ---- TABLE ---- */
  .table-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--bg-card2); }
  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  td.g { color: var(--green); }
  td.r { color: var(--red); }
  td.dim { color: var(--text-muted); font-size: 11px; }

  /* ---- LOADING ---- */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); font-family: var(--font-mono); }

  /* ---- ERROR ---- */
  .error-banner {
    background: var(--red-bg);
    border: 1px solid var(--red-border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
    display: none;
  }

  /* ---- FOOTER ---- */
  .footer {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer-left { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); line-height: 1.8; }
  .footer-right { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 768px) {
    .container { padding: 1rem; }
    .metrics-row, .signals-row { grid-template-columns: 1fr; }
    .top-bar { padding: 0 1rem; }
    .page-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">
    <span>₿</span> COT Weekly
  </div>
  <div class="btc-badge">
    <div class="btc-dot"></div>
    <span>BITCOIN FUTURES · CME · CFTC</span>
  </div>
  <div class="header-actions">
    <button class="btn-refresh" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9 9 0 0 1 6.36 2.64L21 3v6h-6l2.18-2.18A7 7 0 1 0 19 12"/></svg>
      Rafraîchir
    </button>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">BTC Commitment of <span>Traders</span></h1>
    <div class="page-meta">
      <span>CFTC Disaggregated Futures Only</span>
      <span class="meta-sep">·</span>
      <span>Code 133741</span>
      <span class="meta-sep">·</span>
      <span id="report-date-label">—</span>
    </div>
  </div>

  <div id="error-banner" class="error-banner">
    ⚠ API CFTC inaccessible — affichage en mode démo avec données illustratives.
  </div>

  <div id="app-content">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Interrogation CFTC API...</div>
    </div>
  </div>
</div>

<script>
let chartInstance = null;
let allData = [];
let activeTab = 'net';

const FALLBACK = [
  { report_date_as_yyyy_mm_dd:'2025-04-22', asset_mgr_positions_long:18423, asset_mgr_positions_short:6201, lev_money_positions_long:24567, lev_money_positions_short:19834, dealer_positions_long:3421, dealer_positions_short:7892 },
  { report_date_as_yyyy_mm_dd:'2025-04-15', asset_mgr_positions_long:17890, asset_mgr_positions_short:6450, lev_money_positions_long:23100, lev_money_positions_short:20100, dealer_positions_long:3280, dealer_positions_short:8100 },
  { report_date_as_yyyy_mm_dd:'2025-04-08', asset_mgr_positions_long:17200, asset_mgr_positions_short:6800, lev_money_positions_long:22400, lev_money_positions_short:21200, dealer_positions_long:3150, dealer_positions_short:8450 },
  { report_date_as_yyyy_mm_dd:'2025-04-01', asset_mgr_positions_long:16800, asset_mgr_positions_short:7100, lev_money_positions_long:21800, lev_money_positions_short:22300, dealer_positions_long:3020, dealer_positions_short:8700 },
  { report_date_as_yyyy_mm_dd:'2025-03-25', asset_mgr_positions_long:16100, asset_mgr_positions_short:7400, lev_money_positions_long:21000, lev_money_positions_short:22800, dealer_positions_long:2900, dealer_positions_short:8950 },
  { report_date_as_yyyy_mm_dd:'2025-03-18', asset_mgr_positions_long:15600, asset_mgr_positions_short:7900, lev_money_positions_long:20200, lev_money_positions_short:23400, dealer_positions_long:2750, dealer_positions_short:9200 },
  { report_date_as_yyyy_mm_dd:'2025-03-11', asset_mgr_positions_long:15100, asset_mgr_positions_short:8200, lev_money_positions_long:19800, lev_money_positions_short:24100, dealer_positions_long:2600, dealer_positions_short:9400 },
  { report_date_as_yyyy_mm_dd:'2025-03-04', asset_mgr_positions_long:14800, asset_mgr_positions_short:8500, lev_money_positions_long:19100, lev_money_positions_short:24800, dealer_positions_long:2500, dealer_positions_short:9600 },
];

function parseCSVRows(csvText) {
  const parsed = Papa.parse(csvText.trim(), { header: true, skipEmptyLines: true });
  const BTC_CODE = '133741';
  return parsed.data
    .filter(r => (r['CFTC_Commodity_Code'] || '').trim() === BTC_CODE)
    .map(r => ({
      report_date_as_yyyy_mm_dd: (r['Report_Date_as_YYYY-MM-DD'] || '').trim(),
      asset_mgr_positions_long:  +r['Asset_Mgr_Positions_Long'],
      asset_mgr_positions_short: +r['Asset_Mgr_Positions_Short'],
      lev_money_positions_long:  +r['Lev_Money_Positions_Long'],
      lev_money_positions_short: +r['Lev_Money_Positions_Short'],
      dealer_positions_long:     +r['Dealer_Positions_Long'],
      dealer_positions_short:    +r['Dealer_Positions_Short'],
    }))
    .filter(r => r.report_date_as_yyyy_mm_dd && !isNaN(r.asset_mgr_positions_long))
    .sort((a, b) => a.report_date_as_yyyy_mm_dd.localeCompare(b.report_date_as_yyyy_mm_dd));
}

async function loadData() {
  document.getElementById('app-content').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Téléchargement données CFTC...</div></div>';
  document.getElementById('error-banner').style.display = 'none';

  const year = new Date().getFullYear();
  const csvDirect  = 'https://publicreporting.cftc.gov/api/explore/v2.1/catalog/datasets/com_disagg_txt_' + year + '/exports/csv?where=cftc_commodity_code%3D%22133741%22&limit=60';
  const csvPrev    = 'https://publicreporting.cftc.gov/api/explore/v2.1/catalog/datasets/com_disagg_txt_' + (year-1) + '/exports/csv?where=cftc_commodity_code%3D%22133741%22&limit=20';

  for (const url of [csvDirect, csvPrev]) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      if (!text || text.length < 100) continue;
      const rows = parseCSVRows(text);
      if (!rows.length) continue;
      allData = rows; render(allData, false); return;
    } catch(e) {}
  }

  for (const url of [csvDirect, csvPrev]) {
    try {
      const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
      if (!res.ok) continue;
      const raw = await res.json();
      const text = raw.contents || '';
      if (text.length < 100) continue;
      const rows = parseCSVRows(text);
      if (!rows.length) continue;
      allData = rows; render(allData, false); return;
    } catch(e) {}
  }

  document.getElementById('error-banner').style.display = 'block';
  allData = FALLBACK;
  render(allData, true);
}

function fmt(n) { return (n >= 0 ? '+' : '') + n.toLocaleString('fr-FR'); }
function abs_fmt(n) { return Math.abs(n).toLocaleString('fr-FR'); }

function render(data, demo) {
  const L = data[data.length - 1];
  const P = data[data.length - 2];

  const actors = [
    { id:'am', cls:'am', name:'Asset Managers', longV: L.asset_mgr_positions_long, shortV: L.asset_mgr_positions_short, pLong: P.asset_mgr_positions_long, pShort: P.asset_mgr_positions_short },
    { id:'lf', cls:'lf', name:'Leveraged Funds', longV: L.lev_money_positions_long, shortV: L.lev_money_positions_short, pLong: P.lev_money_positions_long, pShort: P.lev_money_positions_short },
    { id:'dl', cls:'dl', name:'Dealers', longV: L.dealer_positions_long, shortV: L.dealer_positions_short, pLong: P.dealer_positions_long, pShort: P.dealer_positions_short },
  ];

  const dateStr = L.report_date_as_yyyy_mm_dd;
  const d = new Date(dateStr + 'T12:00:00Z');
  const displayDate = d.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  document.getElementById('report-date-label').textContent = 'Semaine du ' + displayDate + (demo ? ' — MODE DÉMO' : '');

  // Actor cards
  const cardsHtml = actors.map(a => {
    const net = a.longV - a.shortV;
    const pNet = a.pLong - a.pShort;
    const delta = net - pNet;
    const pct = Math.round(Math.abs(net) / (a.longV + a.shortV) * 100);
    const isPos = net >= 0;
    return `
      <div class="actor-card ${a.cls}">
        <div class="actor-header">
          <span class="actor-name">${a.name}</span>
        </div>
        <div class="position-row">
          <span class="pos-label">Long</span>
          <span class="pos-long">${a.longV.toLocaleString('fr-FR')}</span>
        </div>
        <div class="position-row">
          <span class="pos-label">Short</span>
          <span class="pos-short">${a.shortV.toLocaleString('fr-FR')}</span>
        </div>
        <div class="net-section">
          <div class="net-row">
            <span class="net-label">Position nette</span>
            <span class="net-value ${isPos ? 'pos' : 'neg'}">${fmt(net)}</span>
          </div>
          <div class="net-bar"><div class="net-fill ${isPos ? 'pos' : 'neg'}" style="width:${pct}%"></div></div>
          <div class="delta-line ${delta >= 0 ? 'delta-pos' : 'delta-neg'}">
            ${delta >= 0 ? '▲' : '▼'} ${fmt(delta)} vs semaine préc.
          </div>
        </div>
      </div>`;
  }).join('');

  // Signal cards
  const signalsHtml = actors.map(a => {
    const net = a.longV - a.shortV;
    const delta = net - (a.pLong - a.pShort);
    let cls, label, icon, text;
    if (net > 0 && delta > 0) {
      cls = 'sig-bullish'; label = 'Haussier ↑'; icon = '▲';
      text = 'Position nette longue en hausse. Accumulation institutionnelle en cours — signal fort.';
    } else if (net > 0 && delta <= 0) {
      cls = 'sig-neutral'; label = 'Haussier ↘'; icon = '→';
      text = 'Position nette longue mais en réduction. Distribution partielle possible, surveiller la suite.';
    } else if (net < 0 && delta < 0) {
      cls = 'sig-bearish'; label = 'Baissier ↓'; icon = '▼';
      text = 'Position nette short en hausse. Pression vendeuse institutionnelle — prudence à court terme.';
    } else {
      cls = 'sig-neutral'; label = 'Baissier ↗'; icon = '→';
      text = 'Position short en réduction. Possible couverture — surveiller un retournement.';
    }
    return `
      <div class="signal-card">
        <div class="signal-name">${a.name}</div>
        <span class="signal-badge ${cls}">${icon} ${label}</span>
        <div class="signal-text">${text}</div>
      </div>`;
  }).join('');

  // History table
  const tableRows = data.slice(-8).reverse().map(d => {
    const amNet = d.asset_mgr_positions_long - d.asset_mgr_positions_short;
    const lfNet = d.lev_money_positions_long - d.lev_money_positions_short;
    const dlNet = d.dealer_positions_long - d.dealer_positions_short;
    return `<tr>
      <td>${d.report_date_as_yyyy_mm_dd}</td>
      <td class="${amNet >= 0 ? 'g' : 'r'}">${fmt(amNet)}</td>
      <td class="dim">${d.asset_mgr_positions_long.toLocaleString('fr-FR')} / ${d.asset_mgr_positions_short.toLocaleString('fr-FR')}</td>
      <td class="${lfNet >= 0 ? 'g' : 'r'}">${fmt(lfNet)}</td>
      <td class="dim">${d.lev_money_positions_long.toLocaleString('fr-FR')} / ${d.lev_money_positions_short.toLocaleString('fr-FR')}</td>
      <td class="${dlNet >= 0 ? 'g' : 'r'}">${fmt(dlNet)}</td>
      <td class="dim">${d.dealer_positions_long.toLocaleString('fr-FR')} / ${d.dealer_positions_short.toLocaleString('fr-FR')}</td>
    </tr>`;
  }).join('');

  document.getElementById('app-content').innerHTML = `
    <div class="section">
      <div class="section-header"><span class="section-title">Positions nettes — snapshot</span></div>
      <div class="metrics-row">${cardsHtml}</div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Évolution 8 semaines</span>
        <div class="tab-group">
          <button class="tab ${activeTab==='net'?'active':''}" onclick="switchTab('net',this)">Net</button>
          <button class="tab ${activeTab==='long'?'active':''}" onclick="switchTab('long',this)">Longs</button>
          <button class="tab ${activeTab==='short'?'active':''}" onclick="switchTab('short',this)">Shorts</button>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-legend">
          <span class="legend-item"><span class="legend-line" style="background:#4d9fff"></span>Asset Managers</span>
          <span class="legend-item"><span class="legend-line" style="background:#f7931a;border-top:2px dashed #f7931a;height:0;width:20px"></span>Leveraged Funds</span>
          <span class="legend-item"><span class="legend-line" style="background:#ff6b6b"></span>Dealers</span>
        </div>
        <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="Évolution des positions COT BTC sur 8 semaines"></canvas></div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><span class="section-title">Lecture de marché</span></div>
      <div class="signals-row">${signalsHtml}</div>
    </div>

    <div class="section">
      <div class="section-header"><span class="section-title">Historique détaillé</span></div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Semaine</th>
              <th>AM Net</th>
              <th>AM L / S</th>
              <th>LF Net</th>
              <th>LF L / S</th>
              <th>DL Net</th>
              <th>DL L / S</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    <div class="footer">
      <div class="footer-left">
        Source : CFTC Commitment of Traders — Disaggregated Futures Only<br>
        Commodity : Bitcoin (BTC/USD) · Code CFTC : 133741 · Rapport publié chaque vendredi<br>
        AM = Asset Managers · LF = Leveraged Funds · DL = Dealers / Intermediaries
      </div>
      <div class="footer-right">${demo ? '⚠ Mode démo' : '✓ Données live'}</div>
    </div>
  `;

  renderChart(data, activeTab);
}

function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderChart(allData, tab);
}

function renderChart(data, mode) {
  const slice = data.slice(-8);
  const labels = slice.map(d => d.report_date_as_yyyy_mm_dd.slice(5));
  let datasets;

  if (mode === 'net') {
    datasets = [
      { label:'AM Net', data: slice.map(d => d.asset_mgr_positions_long - d.asset_mgr_positions_short), borderColor:'#4d9fff', backgroundColor:'rgba(77,159,255,0.05)', tension:0.3, fill:false, borderWidth:2, pointRadius:3, pointBackgroundColor:'#4d9fff', borderDash:[] },
      { label:'LF Net', data: slice.map(d => d.lev_money_positions_long - d.lev_money_positions_short), borderColor:'#f7931a', backgroundColor:'rgba(247,147,26,0.05)', tension:0.3, fill:false, borderWidth:2, pointRadius:3, pointBackgroundColor:'#f7931a', borderDash:[6,3] },
      { label:'DL Net', data: slice.map(d => d.dealer_positions_long - d.dealer_positions_short), borderColor:'#ff6b6b', backgroundColor:'rgba(255,107,107,0.05)', tension:0.3, fill:false, borderWidth:2, pointRadius:3, pointBackgroundColor:'#ff6b6b', borderDash:[2,2] },
    ];
  } else if (mode === 'long') {
    datasets = [
      { label:'AM Long', data: slice.map(d => d.asset_mgr_positions_long), borderColor:'#4d9fff', tension:0.3, fill:false, borderWidth:2, pointRadius:3, borderDash:[] },
      { label:'LF Long', data: slice.map(d => d.lev_money_positions_long), borderColor:'#f7931a', tension:0.3, fill:false, borderWidth:2, pointRadius:3, borderDash:[6,3] },
      { label:'DL Long', data: slice.map(d => d.dealer_positions_long), borderColor:'#ff6b6b', tension:0.3, fill:false, borderWidth:2, pointRadius:3, borderDash:[2,2] },
    ];
  } else {
    datasets = [
      { label:'AM Short', data: slice.map(d => d.asset_mgr_positions_short), borderColor:'#4d9fff', tension:0.3, fill:false, borderWidth:2, pointRadius:3, borderDash:[] },
      { label:'LF Short', data: slice.map(d => d.lev_money_positions_long), borderColor:'#f7931a', tension:0.3, fill:false, borderWidth:2, pointRadius:3, borderDash:[6,3] },
      { label:'DL Short', data: slice.map(d => d.dealer_positions_short), borderColor:'#ff6b6b', tension:0.3, fill:false, borderWidth:2, pointRadius:3, borderDash:[2,2] },
    ];
  }

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const ctx = document.getElementById('mainChart');
  if (!ctx) return;

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161a22',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#6b7280',
          bodyColor: '#e8eaf0',
          titleFont: { family:'DM Mono, monospace', size:11 },
          bodyFont: { family:'DM Mono, monospace', size:12 },
          callbacks: {
            label: ctx => `  ${ctx.dataset.label}: ${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toLocaleString('fr-FR')}`
          }
        }
      },
      scales: {
        x: {
          ticks: { color:'#6b7280', font:{ family:'DM Mono, monospace', size:11 }, maxRotation:0 },
          grid: { color:'rgba(255,255,255,0.04)' },
          border: { color:'rgba(255,255,255,0.07)' }
        },
        y: {
          ticks: { color:'#6b7280', font:{ family:'DM Mono, monospace', size:11 }, callback: v => v >= 1000 || v <= -1000 ? (v/1000).toFixed(0)+'k' : v },
          grid: { color:'rgba(255,255,255,0.04)' },
          border: { color:'rgba(255,255,255,0.07)' }
        }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
